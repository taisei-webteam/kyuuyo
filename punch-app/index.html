<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>打刻</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --success: #16a34a;
      --success-hover: #15803d;
      --warning: #ea580c;
      --warning-hover: #c2410c;
      --info: #0891b2;
      --info-hover: #0e7490;
      --danger: #dc2626;
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-secondary: #64748b;
      --radius: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      max-width: 1024px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }

    .header-left { display: flex; align-items: center; gap: 16px; }

    .header-title { font-size: 1.5rem; font-weight: 800; color: var(--text); }

    .header-clock {
      font-size: 2.5rem; font-weight: 700;
      font-variant-numeric: tabular-nums; color: var(--primary);
    }

    .header-date { font-size: 0.875rem; color: var(--text-secondary); text-align: right; }

    .btn-history {
      padding: 6px 14px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; font-size: 0.8rem; font-weight: 600; cursor: pointer;
      color: var(--text-secondary); transition: all 0.15s;
    }
    .btn-history:hover { border-color: var(--primary); color: var(--primary); }

    .screen { display: none; flex: 1; flex-direction: column; }
    .screen.active { display: flex; }

    /* ── Employee Grid ── */
    .employee-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px; flex: 1; align-content: start;
    }

    .employee-card {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      padding: 20px 12px; background: var(--surface); border: 2px solid var(--border);
      border-radius: var(--radius); cursor: pointer;
      transition: transform 0.12s, border-color 0.15s, box-shadow 0.15s; user-select: none;
    }
    .employee-card:active { transform: scale(0.96); }
    .employee-card:hover { border-color: var(--primary); box-shadow: 0 4px 12px rgba(37,99,235,0.15); }

    .employee-avatar {
      width: 56px; height: 56px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.25rem; font-weight: 700; color: #fff;
    }
    .employee-name { font-size: 1rem; font-weight: 600; text-align: center; }
    .employee-dept { font-size: 0.7rem; color: var(--text-secondary); }
    .employee-status { font-size: 0.675rem; padding: 2px 8px; border-radius: 9999px; font-weight: 600; }
    .status-out { background: #f1f5f9; color: #64748b; }
    .status-in { background: #dcfce7; color: #16a34a; }
    .status-goout { background: #fff7ed; color: #ea580c; }
    .status-done { background: #e0f2fe; color: #0369a1; }

    /* ── Punch Screen ── */
    .punch-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }

    .btn-back {
      background: none; border: 1px solid var(--border); border-radius: 10px;
      padding: 8px 16px; font-size: 0.875rem; font-weight: 600;
      cursor: pointer; color: var(--text-secondary); transition: background 0.12s;
    }
    .btn-back:hover { background: #f1f5f9; }

    .punch-employee-name { font-size: 1.25rem; font-weight: 700; }
    .punch-employee-dept { font-size: 0.8rem; color: var(--text-secondary); }

    .punch-buttons {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
      max-width: 672px; margin: 0 auto; width: 100%;
    }

    .punch-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; padding: 36px 16px; border: none; border-radius: 20px;
      font-size: 1.125rem; font-weight: 700; color: #fff; cursor: pointer;
      transition: transform 0.1s, opacity 0.15s; user-select: none;
      max-width: 320px; width: 100%; margin: 0 auto;
    }
    .punch-btn:active { transform: scale(0.95); }
    .punch-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .punch-btn-icon {
      width: 56px; height: 56px; border-radius: 50%; background: rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
    }
    .punch-btn-label { font-size: 1.125rem; }

    .btn-clockin { background: var(--success); }
    .btn-clockin:hover:not(:disabled) { background: var(--success-hover); }
    .btn-goout { background: var(--warning); }
    .btn-goout:hover:not(:disabled) { background: var(--warning-hover); }
    .btn-goreturn { background: var(--info); }
    .btn-goreturn:hover:not(:disabled) { background: var(--info-hover); }
    .btn-clockout { background: var(--danger); }
    .btn-clockout:hover:not(:disabled) { background: #b91c1c; }

    @media (max-width: 600px) {
      .punch-buttons { grid-template-columns: 1fr; max-width: 320px; }
    }

    /* ── Message overlay ── */
    .msg-overlay {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; z-index: 200; pointer-events: none;
    }
    .msg-bubble {
      padding: 28px 48px; border-radius: 24px; font-size: 1.5rem; font-weight: 800;
      color: #fff; opacity: 0; transform: scale(0.5);
      animation: msgPop 2.5s ease-out forwards; text-align: center; line-height: 1.5;
      box-shadow: 0 12px 48px rgba(0,0,0,0.3);
    }
    .msg-clockin { background: linear-gradient(135deg, #16a34a, #22c55e); }
    .msg-clockout { background: linear-gradient(135deg, #2563eb, #3b82f6); }

    @keyframes msgPop {
      0%   { opacity: 0; transform: scale(0.5); }
      15%  { opacity: 1; transform: scale(1.05); }
      25%  { transform: scale(1); }
      80%  { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.95) translateY(-20px); }
    }

    /* ── Today log ── */
    .today-log {
      margin-top: 32px; max-width: 672px; margin-left: auto; margin-right: auto; width: 100%;
    }
    .today-log-title {
      font-size: 0.8rem; font-weight: 600; color: var(--text-secondary);
      margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .today-log-list {
      list-style: none; background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border); overflow: hidden;
    }
    .today-log-item {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; border-bottom: 1px solid #f1f5f9; font-size: 0.875rem;
    }
    .today-log-item:last-child { border-bottom: none; }

    .log-type {
      font-weight: 600; padding: 2px 10px; border-radius: 9999px; font-size: 0.75rem;
      flex-shrink: 0;
    }
    .log-type-clockin { background: #dcfce7; color: #16a34a; }
    .log-type-goout { background: #fff7ed; color: #ea580c; }
    .log-type-goreturn { background: #e0f2fe; color: #0284c7; }
    .log-type-clockout { background: #fee2e2; color: #dc2626; }
    .log-type-cancel { background: #f1f5f9; color: #94a3b8; }

    .log-time { font-variant-numeric: tabular-nums; font-weight: 500; color: var(--text); }
    .log-cancelled .log-time { text-decoration: line-through; color: #94a3b8; }
    .log-cancelled .log-type { opacity: 0.5; text-decoration: line-through; }
    .log-reason { font-size: 0.7rem; color: #94a3b8; flex: 1; text-align: right; }

    .btn-cancel-punch {
      background: none; border: 1px solid var(--border); border-radius: 6px;
      padding: 2px 8px; font-size: 0.675rem; color: var(--text-secondary);
      cursor: pointer; transition: all 0.12s; flex-shrink: 0;
    }
    .btn-cancel-punch:hover { border-color: var(--danger); color: var(--danger); }

    /* ── Cancel Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center; z-index: 300;
    }
    .modal-box {
      background: var(--surface); border-radius: 16px; padding: 24px;
      width: 90%; max-width: 400px; box-shadow: 0 12px 40px rgba(0,0,0,0.2);
    }
    .modal-title { font-size: 1rem; font-weight: 700; margin-bottom: 16px; }
    .modal-subtitle { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 12px; }

    .reason-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .reason-option {
      display: flex; align-items: center; gap: 10px; padding: 10px 14px;
      border: 2px solid var(--border); border-radius: 10px; cursor: pointer;
      font-size: 0.875rem; font-weight: 500; transition: border-color 0.15s;
    }
    .reason-option:hover { border-color: var(--primary); }
    .reason-option.selected { border-color: var(--primary); background: #eff6ff; }
    .reason-option input[type="radio"] { accent-color: var(--primary); }

    .reason-input {
      width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
      font-size: 0.875rem; margin-top: 8px; outline: none;
    }
    .reason-input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(37,99,235,0.12); }

    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
    .modal-btn {
      padding: 8px 20px; border-radius: 8px; font-size: 0.875rem; font-weight: 600;
      cursor: pointer; border: none; transition: all 0.15s;
    }
    .modal-btn-cancel { background: var(--surface); border: 1px solid var(--border); color: var(--text-secondary); }
    .modal-btn-cancel:hover { background: #f1f5f9; }
    .modal-btn-confirm { background: var(--danger); color: #fff; }
    .modal-btn-confirm:hover { background: #b91c1c; }
    .modal-btn-confirm:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── History Screen ── */
    .history-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .history-filter { display: flex; gap: 8px; align-items: center; flex: 1; flex-wrap: wrap; }
    .history-filter select {
      padding: 6px 12px; border: 1px solid var(--border); border-radius: 8px;
      font-size: 0.8rem; background: var(--surface); cursor: pointer;
    }

    .history-table {
      width: 100%; border-collapse: collapse; font-size: 0.8rem;
      background: var(--surface); border-radius: 12px; overflow: hidden;
      border: 1px solid var(--border);
    }
    .history-table th {
      background: #f8fafc; padding: 10px 12px; text-align: left;
      font-weight: 600; color: var(--text-secondary); font-size: 0.725rem;
      border-bottom: 2px solid var(--border);
    }
    .history-table td {
      padding: 8px 12px; border-bottom: 1px solid #f1f5f9;
    }
    .history-table tr:hover td { background: #fafbfc; }

    .history-cancelled td { color: #94a3b8; }
    .history-cancelled .log-time { text-decoration: line-through; }

    .toast {
      position: fixed; bottom: 32px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #0f172a; color: #fff; padding: 14px 28px; border-radius: 14px;
      font-size: 1rem; font-weight: 600; box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      opacity: 0; transition: transform 0.3s ease-out, opacity 0.3s ease-out;
      z-index: 100; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    .empty-state {
      text-align: center; padding: 40px 16px; color: var(--text-secondary); font-size: 0.875rem;
    }

    /* 端末登録画面 */
    .setup-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: var(--bg);
      display: none; align-items: center; justify-content: center; padding: 24px;
    }
    .setup-overlay.show { display: flex; }
    .setup-card {
      width: 100%; max-width: 440px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(0,0,0,0.12); padding: 32px;
      display: flex; flex-direction: column; gap: 18px;
    }
    .setup-title { font-size: 1.5rem; font-weight: 700; color: var(--text); }
    .setup-desc { font-size: 0.95rem; line-height: 1.8; color: var(--text-secondary); }
    .setup-field { display: flex; flex-direction: column; gap: 8px; }
    .setup-label { font-size: 0.9rem; font-weight: 600; color: var(--text-secondary); }
    .setup-input {
      font: inherit; padding: 14px 16px; border: 1px solid var(--border);
      border-radius: 10px; background: var(--bg); color: var(--text);
    }
    .setup-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.15); }
    .setup-error {
      font-size: 0.9rem; color: #b91c1c; background: #fee2e2;
      border: 1px solid #fecaca; border-radius: 10px; padding: 12px 14px; display: none;
    }
    .setup-error.show { display: block; }
    .setup-btn {
      margin-top: 4px; padding: 16px; border-radius: 10px; border: none;
      background: var(--primary); color: #fff; font-weight: 700; font-size: 1.05rem; cursor: pointer;
    }
    .setup-btn:hover { background: var(--primary-hover); }
    .setup-btn:disabled { opacity: 0.55; cursor: not-allowed; }
  </style>
  </head>
  <body>
  <div class="app">
    <div class="header">
      <div class="header-left">
        <div>
          <div class="header-title">打刻</div>
          <div class="header-date" id="headerDate"></div>
        </div>
        <button class="btn-history" id="btnShowHistory">履歴</button>
      </div>
      <div class="header-clock" id="headerClock"></div>
    </div>

    <div class="screen active" id="screenList">
      <div class="employee-grid" id="employeeGrid"></div>
    </div>

    <div class="screen" id="screenPunch">
      <div class="punch-header">
        <button class="btn-back" id="btnBack">← 戻る</button>
        <div>
          <div class="punch-employee-name" id="punchName"></div>
          <div class="punch-employee-dept" id="punchDept"></div>
        </div>
      </div>
      <div class="punch-buttons">
        <button class="punch-btn btn-clockin" id="btnClockIn">
          <span class="punch-btn-icon">▶</span>
          <span class="punch-btn-label">出勤</span>
        </button>
        <button class="punch-btn btn-goout" id="btnGoOut">
          <span class="punch-btn-icon">↗</span>
          <span class="punch-btn-label">外出</span>
        </button>
        <button class="punch-btn btn-goreturn" id="btnGoReturn">
          <span class="punch-btn-icon">↩</span>
          <span class="punch-btn-label">戻り</span>
        </button>
        <button class="punch-btn btn-clockout" id="btnClockOut">
          <span class="punch-btn-icon">■</span>
          <span class="punch-btn-label">退勤</span>
        </button>
      </div>
      <div class="today-log">
        <div class="today-log-title">本日の打刻履歴</div>
        <ul class="today-log-list" id="todayLog"></ul>
      </div>
    </div>

    <div class="screen" id="screenHistory">
      <div class="history-header">
        <button class="btn-back" id="btnHistoryBack">← 戻る</button>
        <div class="history-filter">
          <select id="historyEmployee">
            <option value="">全従業員</option>
          </select>
          <select id="historyDate"></select>
        </div>
      </div>
      <table class="history-table" id="historyTable">
        <thead>
          <tr>
            <th>日付</th>
            <th>従業員</th>
            <th>種別</th>
            <th>時刻</th>
            <th>状態</th>
            <th>備考</th>
          </tr>
        </thead>
        <tbody id="historyBody"></tbody>
      </table>
    </div>
  </div>

  <div class="setup-overlay" id="setupOverlay">
    <div class="setup-card">
      <div class="setup-title">端末の登録</div>
      <div class="setup-desc">この端末で打刻を行うには、管理者による登録が必要です。管理パスワードを入力してください。登録は最初の一度だけです。</div>
      <div class="setup-field">
        <label class="setup-label" for="setupLabel">端末名（任意）</label>
        <input class="setup-input" id="setupLabel" type="text" placeholder="例：事務所iPad" autocomplete="off" />
      </div>
      <div class="setup-field">
        <label class="setup-label" for="setupPassword">管理パスワード</label>
        <input class="setup-input" id="setupPassword" type="password" placeholder="管理パスワード" autocomplete="off" />
      </div>
      <div class="setup-error" id="setupError"></div>
      <button class="setup-btn" id="setupBtn">この端末を登録する</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API_BASE_URL = '';

    // ── デモモード ──
    // URL に ?demo=1 を付けたときだけ有効。バックエンド（/api）無しで動作確認するための
    // ローカル専用モード。端末登録をスキップし、サンプルの1ヶ月分打刻を表示する。
    const IS_DEMO = new URLSearchParams(location.search).has('demo');

    // ── 端末登録（デバイストークン）──
    const DEVICE_TOKEN_KEY = 'punch_device_token';
    function getDeviceToken() {
      try { return localStorage.getItem(DEVICE_TOKEN_KEY); } catch (e) { return null; }
    }
    function setDeviceToken(token) {
      try { localStorage.setItem(DEVICE_TOKEN_KEY, token); } catch (e) {}
    }
    function clearDeviceToken() {
      try { localStorage.removeItem(DEVICE_TOKEN_KEY); } catch (e) {}
    }
    function showDeviceSetup() {
      const el = document.getElementById('setupOverlay');
      if (el) el.classList.add('show');
    }
    function hideDeviceSetup() {
      const el = document.getElementById('setupOverlay');
      if (el) el.classList.remove('show');
    }
    async function registerDevice(password, label) {
      const res = await fetch(`${API_BASE_URL}/api/devices/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password, label }),
      });
      const body = await res.json().catch(() => ({}));
      if (!res.ok || !body.token) {
        throw new Error(body.error ?? `登録に失敗しました (${res.status})`);
      }
      setDeviceToken(body.token);
    }

    const DEFAULT_EMPLOYEES = [
      { id: 1, name: '藤原 誠一', dept: '総務部', type: '役員', color: '#3b82f6' },
      { id: 2, name: '中村 健太', dept: '営業部', type: '社員', color: '#ef4444' },
      { id: 3, name: '山本 裕子', dept: '総務部', type: '役員', color: '#10b981' },
      { id: 4, name: '高橋 大輔', dept: '技術部', type: '社員', color: '#f59e0b' },
      { id: 5, name: '佐藤 俊介', dept: '営業部', type: '社員', color: '#8b5cf6' },
      { id: 6, name: '伊藤 翔太', dept: '製造部', type: 'パート', color: '#ec4899' },
      { id: 7, name: '渡辺 美咲', dept: '製造部', type: 'パート', color: '#06b6d4' },
      { id: 8, name: '松田 浩二', dept: '倉庫部', type: 'パート', color: '#f97316' },
    ];

    let EMPLOYEES = [...DEFAULT_EMPLOYEES];
    let EMP_MAP = {};

    function rebuildEmployeeMap() {
      EMP_MAP = {};
      EMPLOYEES.forEach(e => EMP_MAP[e.id] = e);
    }

    rebuildEmployeeMap();

    const PUNCH_TYPES = {
      clockin:   { label: '出勤', cssClass: 'log-type-clockin' },
      goout:     { label: '外出', cssClass: 'log-type-goout' },
      goreturn:  { label: '戻り', cssClass: 'log-type-goreturn' },
      clockout:  { label: '退勤', cssClass: 'log-type-clockout' },
    };

    const CANCEL_REASONS = ['入力間違い', '人違い', '誤動作'];

    // { "empId-date": [ { type, time, cancelled, cancelReason, cancelTime } ] }
    let punchRecords = {};
    let selectedEmployee = null;

    function todayKey() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    // ISO文字列をローカル(端末TZ)の日付キー YYYY-MM-DD に変換する
    function localDateKey(iso) {
      const d = new Date(iso);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function timeFromIso(iso) {
      const d = new Date(iso);
      return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    function getRecords(empId, date) {
      const key = `${empId}-${date || todayKey()}`;
      if (!punchRecords[key]) punchRecords[key] = [];
      return punchRecords[key];
    }

    function getAllRecords() {
      const all = [];
      for (const [key, recs] of Object.entries(punchRecords)) {
        const [empId, ...dateParts] = key.split('-');
        const date = dateParts.join('-');
        recs.forEach(r => all.push({ ...r, empId: Number(empId), date }));
      }
      return all.sort((a, b) => {
        if (a.date !== b.date) return b.date.localeCompare(a.date);
        return a.time.localeCompare(b.time);
      });
    }

    function getActiveRecords(empId) {
      return getRecords(empId).filter(r => !r.cancelled);
    }

    function getStatus(empId) {
      const recs = getActiveRecords(empId);
      if (recs.length === 0) return 'out';
      const last = recs[recs.length - 1].type;
      if (last === 'clockout') return 'done';
      if (last === 'goout') return 'goout';
      return 'in';
    }

    function nowTimeStr() {
      const d = new Date();
      return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    // ローカル(端末TZ)の当日 00:00〜23:59 を UTC の ISO 文字列(Z付き)で返す。
    // タイムゾーンなしの文字列を送るとサーバ側(UTC)で解釈がずれ、当日の記録が欠落するため。
    function todayRange() {
      const now = new Date();
      const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0, 0);
      const end = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59, 999);
      return {
        start: start.toISOString(),
        end: end.toISOString(),
      };
    }

    // 履歴閲覧用。ローカル(端末TZ)の「1ヶ月前の00:00」〜「当日の23:59」を ISO(Z付き)で返す。
    function monthRange() {
      const now = new Date();
      const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0, 0);
      start.setMonth(start.getMonth() - 1);
      const end = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59, 999);
      return {
        start: start.toISOString(),
        end: end.toISOString(),
      };
    }

    function formatApiTime(iso) {
      const d = new Date(iso);
      return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    function localTypeToApi(type) {
      if (type === 'clockin') return 'clock_in';
      if (type === 'clockout') return 'clock_out';
      if (type === 'goout') return 'go_out';
      if (type === 'goreturn') return 'go_return';
      return null;
    }

    function apiTypeToLocal(type) {
      if (type === 'clock_in') return 'clockin';
      if (type === 'clock_out') return 'clockout';
      if (type === 'go_out') return 'goout';
      if (type === 'go_return') return 'goreturn';
      return 'clockout';
    }

    async function apiJson(path, options) {
      const token = getDeviceToken();
      const res = await fetch(`${API_BASE_URL}${path}`, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          ...(token ? { 'x-device-token': token } : {}),
          ...(options?.headers ?? {}),
        },
      });
      // 端末が未登録・失効している場合はトークンを破棄し、登録画面へ
      if (res.status === 401) {
        clearDeviceToken();
        showDeviceSetup();
        const body = await res.json().catch(() => ({}));
        throw new Error(body.error ?? 'この端末は打刻を許可されていません');
      }
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.error ?? `API error: ${res.status}`);
      }
      return res.json();
    }

    async function loadCloudData() {
      const { start, end } = todayRange();
      const [empData, punchData] = await Promise.all([
        apiJson('/api/employees'),
        apiJson(`/api/punches?${new URLSearchParams({ start, end }).toString()}`),
      ]);

      const colors = DEFAULT_EMPLOYEES.map(e => e.color);
      EMPLOYEES = empData.employees.map((emp, idx) => ({
        id: emp.id,
        name: emp.name,
        dept: '',
        type: emp.employee_type,
        color: colors[idx % colors.length],
      }));
      rebuildEmployeeMap();

      punchRecords = {};
      for (const punch of punchData.punches) {
        const recDate = localDateKey(punch.punched_at);
        const recs = getRecords(punch.employee_id, recDate);
        recs.push({
          remoteId: punch.id,
          type: apiTypeToLocal(punch.punch_type),
          time: formatApiTime(punch.punched_at),
          cancelled: punch.cancelled,
          cancelReason: punch.cancelled ? '取消済' : '',
          cancelTime: '',
        });
      }
    }

    // 履歴画面用: 過去1ヶ月分の打刻を取得して punchRecords を差し替える。
    // 当日分も含むため、グリッドの出退勤ステータス（当日キー参照）も維持される。
    async function loadMonthData() {
      const { start, end } = monthRange();
      const punchData = await apiJson(`/api/punches?${new URLSearchParams({ start, end }).toString()}`);
      punchRecords = {};
      for (const punch of punchData.punches) {
        const recDate = localDateKey(punch.punched_at);
        const recs = getRecords(punch.employee_id, recDate);
        recs.push({
          remoteId: punch.id,
          type: apiTypeToLocal(punch.punch_type),
          time: formatApiTime(punch.punched_at),
          cancelled: punch.cancelled,
          cancelReason: punch.cancelled ? '取消済' : '',
          cancelTime: '',
        });
      }
    }

    // デモモード用: 過去1ヶ月分（平日）のサンプル打刻を punchRecords に生成する。
    function seedDemoData() {
      EMPLOYEES = [...DEFAULT_EMPLOYEES];
      rebuildEmployeeMap();
      punchRecords = {};
      const now = new Date();
      for (let i = 0; i < 31; i++) {
        const day = new Date(now.getFullYear(), now.getMonth(), now.getDate() - i);
        if (day.getDay() === 0 || day.getDay() === 6) continue; // 土日は除外
        const dateKey = `${day.getFullYear()}-${String(day.getMonth()+1).padStart(2,'0')}-${String(day.getDate()).padStart(2,'0')}`;
        EMPLOYEES.forEach((emp, idx) => {
          // 一部の従業員・日はランダムに休みにして変化をつける
          if ((i + idx) % 7 === 3) return;
          const recs = getRecords(emp.id, dateKey);
          const inH = 8, inM = 20 + ((idx * 3 + i) % 20);
          recs.push({ remoteId: `demo-${emp.id}-${i}-in`, type: 'clockin', time: `${String(inH).padStart(2,'0')}:${String(inM).padStart(2,'0')}`, cancelled: false, cancelReason: '', cancelTime: '' });
          // 当日(i===0)は一部だけ退勤済みにして「出勤中」も見せる
          if (i === 0 && idx % 2 === 0) return;
          const outH = 17, outM = 25 + ((idx * 5 + i) % 30);
          recs.push({ remoteId: `demo-${emp.id}-${i}-out`, type: 'clockout', time: `${String(outH).padStart(2,'0')}:${String(outM % 60).padStart(2,'0')}`, cancelled: false, cancelReason: '', cancelTime: '' });
        });
      }
    }

    async function createRemotePunch(type, emp = selectedEmployee) {
      if (IS_DEMO) return { id: `demo-${Date.now()}`, punched_at: new Date().toISOString() };
      const apiType = localTypeToApi(type);
      if (!apiType || !emp) return null;
      const data = await apiJson('/api/punches', {
        method: 'POST',
        body: JSON.stringify({
          employeeId: emp.id,
          employeeName: emp.name,
          punchType: apiType,
        }),
      });
      return data.punch ?? null;
    }

    async function cancelRemotePunch(rec) {
      if (IS_DEMO) return;
      if (!selectedEmployee || !rec.remoteId) return;
      const { start, end } = todayRange();
      await apiJson('/api/punches/cancel', {
        method: 'POST',
        body: JSON.stringify({
          punchId: rec.remoteId,
          employeeId: selectedEmployee.id,
          start,
          end,
        }),
      });
    }

    // ── Clock ──
    let currentDayKey = todayKey();

    // 0時0分をまたいだときの処理。
    // 本番: ページを丸ごとリロードして当日実績をリセットし、PWAの更新も取り込む。
    //   （iPadがスリープしていてもタイマー復帰時 or 画面復帰時に日付変化を検知して発火）
    // デモ: リロードせず当日実績だけリセット（動作確認を妨げないため）。
    async function handleDayChange() {
      if (!IS_DEMO) {
        location.reload();
        return;
      }
      punchRecords = {};
      renderGrid();
    }

    function updateClock() {
      const now = new Date();
      document.getElementById('headerClock').textContent =
        `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
      const wd = ['日','月','火','水','木','金','土'];
      document.getElementById('headerDate').textContent =
        `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${wd[now.getDay()]}）`;

      const key = todayKey();
      if (key !== currentDayKey) {
        currentDayKey = key;
        handleDayChange();
      }
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ── Toast ──
    let toastTimer = null;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
    }

    // ── Screens ──
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // ── Employee Grid ──
    function renderGrid() {
      const grid = document.getElementById('employeeGrid');
      grid.innerHTML = '';
      EMPLOYEES.forEach(emp => {
        const status = getStatus(emp.id);
        const statusLabel = status === 'in' ? '出勤中' : status === 'goout' ? '外出中' : status === 'done' ? '退勤済' : '未出勤';
        const statusClass = status === 'in' ? 'status-in' : status === 'goout' ? 'status-goout' : status === 'done' ? 'status-done' : 'status-out';
        const card = document.createElement('div');
        card.className = 'employee-card';
        card.innerHTML = `
          <div class="employee-avatar" style="background:${emp.color}">${emp.name[0]}</div>
          <div class="employee-name">${emp.name}</div>
          <div class="employee-dept">${emp.dept}</div>
          <span class="employee-status ${statusClass}">${statusLabel}</span>
        `;
        card.onclick = () => openPunch(emp);
        grid.appendChild(card);
      });
    }

    // ── Punch ──
    function openPunch(emp) {
      selectedEmployee = emp;
      // 打刻ボタン押下前（従業員選択のジェスチャー時）にオーディオを起こしておく。
      // これにより doPunch 時点で AudioContext が running となり、効果音が確実に鳴る。
      primePunchSound();
      document.getElementById('punchName').textContent = emp.name;
      document.getElementById('punchDept').textContent = `${emp.dept}`;
      showScreen('screenPunch');
      updatePunchButtons();
      renderLog();
    }

    function closePunch() {
      clearTimeout(autoReturnTimer);
      selectedEmployee = null;
      showScreen('screenList');
      renderGrid();
    }

    function updatePunchButtons() {
      if (!selectedEmployee) return;
      const status = getStatus(selectedEmployee.id);
      const active = getActiveRecords(selectedEmployee.id);
      const hasClockedIn = active.some(r => r.type === 'clockin');
      document.getElementById('btnClockIn').disabled = hasClockedIn;
      document.getElementById('btnGoOut').disabled = status !== 'in';
      document.getElementById('btnGoReturn').disabled = status !== 'goout';
      document.getElementById('btnClockOut').disabled = status !== 'in' && status !== 'goout';
    }

    let autoReturnTimer = null;
    let punchAudioContext = null;

    function getAudioContext() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return null;
      // iPad がスリープ/バックグラウンドから復帰すると context が closed になることが
      // あるため、その場合は作り直す。
      if (!punchAudioContext || punchAudioContext.state === 'closed') {
        punchAudioContext = new AudioContextClass();
      }
      return punchAudioContext;
    }

    // iOS/Safari 対策: AudioContext を解錠する。resume() だけでは復帰しないため、
    // 無音バッファも再生して確実に起こす。iPad がスリープ/バックグラウンド化すると
    // 再び suspended/closed に戻るため、1度きりにせず毎回のユーザー操作で呼び直して
    // 常に生かしておく（これを怠ると「一度は鳴るが、しばらくすると無音」になる）。
    function ensureAudioReady() {
      const ctx = getAudioContext();
      if (!ctx) return;
      if (ctx.state === 'suspended') ctx.resume().catch(() => {});
      try {
        const source = ctx.createBufferSource();
        source.buffer = ctx.createBuffer(1, 1, 22050);
        source.connect(ctx.destination);
        source.start(0);
      } catch { /* 解錠失敗は無視（後続の resume で再試行される） */ }
    }

    // 従業員選択・打刻の各ジェスチャー時に呼ぶ解錠処理（別名）
    function primePunchSound() {
      ensureAudioReady();
    }

    function playPunchSound(type) {
      const ctx = getAudioContext();
      if (!ctx) return;

      const play = () => {
        const now = ctx.currentTime;
        const baseFreq = {
          clockin: 920,
          goout: 760,
          goreturn: 840,
          clockout: 700,
        }[type] ?? 780;

        const playTone = (freq, start, duration, peak, wave = 'triangle') => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = wave;
          osc.frequency.setValueAtTime(freq, start);
          osc.frequency.exponentialRampToValueAtTime(freq * 1.08, start + duration * 0.4);
          gain.gain.setValueAtTime(0.0001, start);
          gain.gain.exponentialRampToValueAtTime(peak, start + 0.018);
          gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
          osc.connect(gain).connect(ctx.destination);
          osc.start(start);
          osc.stop(start + duration + 0.02);
        };

        playTone(baseFreq, now, 0.18, 0.14);
        playTone(baseFreq * 1.5, now + 0.08, 0.22, 0.12);
        playTone(baseFreq * 2, now + 0.15, 0.16, 0.07, 'sine');
      };

      if (ctx.state === 'suspended') {
        ctx.resume().then(play).catch(() => {});
        return;
      }

      play();
    }

    function showMessage(type) {
      const messages = { clockin: '本日もよろしくお願いします', clockout: 'お疲れさまでした' };
      const msg = messages[type];
      if (!msg) return;
      const overlay = document.createElement('div');
      overlay.className = 'msg-overlay';
      const bubble = document.createElement('div');
      bubble.className = `msg-bubble msg-${type}`;
      bubble.textContent = msg;
      overlay.appendChild(bubble);
      document.body.appendChild(overlay);
      setTimeout(() => overlay.remove(), 2600);
    }

    function doPunch(type) {
      if (!selectedEmployee) return;
      const emp = selectedEmployee;
      primePunchSound();

      // 楽観的更新: 通信完了を待たず、押した瞬間にUIへ反映する
      const recs = getRecords(emp.id);
      const optimisticRec = {
        remoteId: null,
        type,
        time: nowTimeStr(),
        cancelled: false,
        cancelReason: '',
        cancelTime: '',
        pending: true,
      };
      recs.push(optimisticRec);

      showToast(`${PUNCH_TYPES[type].label} ${optimisticRec.time}`);
      showMessage(type);
      playPunchSound(type);
      if (selectedEmployee?.id === emp.id) {
        updatePunchButtons();
        renderLog();
      }
      clearTimeout(autoReturnTimer);
      autoReturnTimer = setTimeout(() => closePunch(), 3000);

      // 背後でサーバへ送信し、結果で確定 or ロールバック
      createRemotePunch(type, emp)
        .then((remote) => {
          optimisticRec.pending = false;
          if (remote) {
            optimisticRec.remoteId = remote.id;
            optimisticRec.time = formatApiTime(remote.punched_at);
          }
          if (selectedEmployee?.id === emp.id) renderLog();
        })
        .catch((err) => {
          const idx = recs.indexOf(optimisticRec);
          if (idx !== -1) recs.splice(idx, 1);
          showToast(`打刻に失敗しました: ${err instanceof Error ? err.message : '不明なエラー'}`);
          if (selectedEmployee?.id === emp.id) {
            updatePunchButtons();
            renderLog();
          } else if (document.getElementById('screenList').classList.contains('active')) {
            renderGrid();
          }
        });
    }

    // ── Cancel Modal ──
    let cancelTarget = null;

    function showCancelModal(recIndex) {
      cancelTarget = recIndex;
      clearTimeout(autoReturnTimer);
      const rec = getRecords(selectedEmployee.id)[recIndex];
      const typeLabel = PUNCH_TYPES[rec.type]?.label ?? rec.type;

      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.id = 'cancelModal';
      overlay.innerHTML = `
        <div class="modal-box">
          <div class="modal-title">打刻取消</div>
          <div class="modal-subtitle">${typeLabel} ${rec.time} を取り消します。理由を選択してください。</div>
          <div class="reason-options" id="reasonOptions">
            ${CANCEL_REASONS.map((r, i) => `
              <label class="reason-option" data-idx="${i}">
                <input type="radio" name="reason" value="${r}" />
                ${r}
              </label>
            `).join('')}
            <label class="reason-option" data-idx="other">
              <input type="radio" name="reason" value="__other__" />
              その他
            </label>
          </div>
          <input type="text" class="reason-input" id="reasonCustom" placeholder="理由を入力..." style="display:none" />
          <div class="modal-actions">
            <button class="modal-btn modal-btn-cancel" id="cancelModalClose">キャンセル</button>
            <button class="modal-btn modal-btn-confirm" id="cancelModalConfirm" disabled>取り消す</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);

      let selectedReason = '';
      const options = overlay.querySelectorAll('.reason-option');
      const customInput = overlay.querySelector('#reasonCustom');
      const confirmBtn = overlay.querySelector('#cancelModalConfirm');

      options.forEach(opt => {
        opt.onclick = () => {
          options.forEach(o => o.classList.remove('selected'));
          opt.classList.add('selected');
          opt.querySelector('input').checked = true;
          const val = opt.querySelector('input').value;
          if (val === '__other__') {
            customInput.style.display = 'block';
            customInput.focus();
            selectedReason = customInput.value.trim();
            confirmBtn.disabled = !selectedReason;
          } else {
            customInput.style.display = 'none';
            selectedReason = val;
            confirmBtn.disabled = false;
          }
        };
      });

      customInput.oninput = () => {
        selectedReason = customInput.value.trim();
        confirmBtn.disabled = !selectedReason;
      };

      overlay.querySelector('#cancelModalClose').onclick = () => overlay.remove();
      overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

      confirmBtn.onclick = async () => {
        const recs = getRecords(selectedEmployee.id);
        const rec = recs[cancelTarget];
        try {
          await cancelRemotePunch(rec);
          rec.cancelled = true;
          rec.cancelReason = selectedReason;
          rec.cancelTime = nowTimeStr();
          overlay.remove();
          showToast(`${typeLabel}を取り消しました`);
          updatePunchButtons();
          renderLog();
        } catch (err) {
          showToast(`取消に失敗しました: ${err instanceof Error ? err.message : '不明なエラー'}`);
        }
      };
    }

    // ── Log ──
    function renderLog() {
      if (!selectedEmployee) return;
      const recs = getRecords(selectedEmployee.id);
      const list = document.getElementById('todayLog');
      if (recs.length === 0) {
        list.innerHTML = '<li class="today-log-item"><span class="empty-state">打刻履歴はありません</span></li>';
        return;
      }
      list.innerHTML = recs.map((r, i) => {
        const cls = r.cancelled ? 'today-log-item log-cancelled' : 'today-log-item';
        const typeClass = r.cancelled ? 'log-type log-type-cancel' : `log-type ${PUNCH_TYPES[r.type].cssClass}`;
        const cancelBtn = !r.cancelled
          ? `<button class="btn-cancel-punch" data-idx="${i}">取消</button>`
          : `<span class="log-reason">取消: ${r.cancelReason}</span>`;
        return `<li class="${cls}">
          <span class="${typeClass}">${PUNCH_TYPES[r.type].label}</span>
          <span class="log-time">${r.time}</span>
          ${cancelBtn}
        </li>`;
      }).join('');

      list.querySelectorAll('.btn-cancel-punch').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          showCancelModal(Number(btn.dataset.idx));
        };
      });
    }

    // ── History Screen ──
    async function openHistory() {
      showScreen('screenHistory');
      const body = document.getElementById('historyBody');
      body.innerHTML = '<tr><td colspan="5" class="empty-state">読み込み中...</td></tr>';

      // 過去1ヶ月分を読み込む（デモモードは既に seed 済みなので取得不要）
      if (!IS_DEMO) {
        try {
          await loadMonthData();
        } catch (err) {
          console.error(err);
          body.innerHTML = `<tr><td colspan="5" class="empty-state">履歴の取得に失敗しました（${err && err.message ? err.message : '不明なエラー'}）</td></tr>`;
          return;
        }
      }

      const empSelect = document.getElementById('historyEmployee');
      empSelect.innerHTML = '<option value="">全従業員</option>' +
        EMPLOYEES.map(e => `<option value="${e.id}">${e.name}</option>`).join('');

      const dateSelect = document.getElementById('historyDate');
      const dates = new Set();
      for (const key of Object.keys(punchRecords)) {
        const parts = key.split('-');
        dates.add(parts.slice(1).join('-'));
      }
      const sorted = [...dates].sort().reverse();
      // 「全期間（直近1ヶ月）」を先頭に、その後に日付ごとの選択肢
      dateSelect.innerHTML = '<option value="">全期間（直近1ヶ月）</option>' +
        sorted.map(d => `<option value="${d}">${d}</option>`).join('');

      renderHistory();
    }

    function renderHistory() {
      const empFilter = document.getElementById('historyEmployee').value;
      const dateFilter = document.getElementById('historyDate').value;
      const body = document.getElementById('historyBody');

      const all = getAllRecords().filter(r => {
        if (empFilter && r.empId !== Number(empFilter)) return false;
        if (dateFilter && r.date !== dateFilter) return false;
        return true;
      });

      if (all.length === 0) {
        body.innerHTML = '<tr><td colspan="6" class="empty-state">履歴はありません</td></tr>';
        return;
      }

      const wd = ['日','月','火','水','木','金','土'];
      const fmtDate = (iso) => {
        const parts = iso.split('-');
        if (parts.length !== 3) return iso;
        const d = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
        return `${Number(parts[1])}/${Number(parts[2])}（${wd[d.getDay()]}）`;
      };

      body.innerHTML = all.map(r => {
        const emp = EMP_MAP[r.empId];
        const rowClass = r.cancelled ? 'history-cancelled' : '';
        const status = r.cancelled ? `<span class="log-type log-type-cancel">取消済</span>` : '<span style="color:#16a34a;font-weight:600;font-size:0.75rem">有効</span>';
        const note = r.cancelled ? `${r.cancelReason}（${r.cancelTime}）` : '';
        return `<tr class="${rowClass}">
          <td style="white-space:nowrap">${fmtDate(r.date)}</td>
          <td>${emp?.name ?? '---'}</td>
          <td><span class="log-type ${PUNCH_TYPES[r.type].cssClass}">${PUNCH_TYPES[r.type].label}</span></td>
          <td class="log-time">${r.time}</td>
          <td>${status}</td>
          <td style="font-size:0.75rem;color:#64748b">${note}</td>
        </tr>`;
      }).join('');
    }

    // ── Events ──
    document.getElementById('btnBack').onclick = closePunch;
    document.getElementById('btnClockIn').onclick = () => doPunch('clockin');
    document.getElementById('btnGoOut').onclick = () => doPunch('goout');
    document.getElementById('btnGoReturn').onclick = () => doPunch('goreturn');
    document.getElementById('btnClockOut').onclick = () => doPunch('clockout');
    document.getElementById('btnShowHistory').onclick = openHistory;
    document.getElementById('btnHistoryBack').onclick = () => { showScreen('screenList'); renderGrid(); };
    document.getElementById('historyEmployee').onchange = renderHistory;
    document.getElementById('historyDate').onchange = renderHistory;

    // すべてのユーザー操作でオーディオを解錠し続ける。1度きりにすると iPad が
    // スリープ/バックグラウンドから復帰した後に suspended のまま無音化するため。
    document.addEventListener('pointerdown', ensureAudioReady, { passive: true });
    document.addEventListener('touchstart', ensureAudioReady, { passive: true });
    // バックグラウンド復帰時にも AudioContext を起こし直す。
    // あわせて、スリープ中に日付が変わっていたら 0時リロード処理を発火させる
    // （スリープ中は setInterval が止まるため、復帰時の検知が本命トリガー）。
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState !== 'visible') return;
      ensureAudioReady();
      if (todayKey() !== currentDayKey) {
        currentDayKey = todayKey();
        handleDayChange();
      }
    });

    function bootApp() {
      return loadCloudData()
        .catch((err) => {
          console.error(err);
          // 未登録・失効時は登録画面が表示されるためトーストは出さない
          if (!getDeviceToken()) return;
          showToast('クラウド接続に失敗しました。デモ従業員を表示します');
        })
        .finally(renderGrid);
    }

    // 端末登録ボタン
    (function wireDeviceSetup() {
      const setupBtn = document.getElementById('setupBtn');
      const errEl = document.getElementById('setupError');
      const pwEl = document.getElementById('setupPassword');
      const labelEl = document.getElementById('setupLabel');
      if (!setupBtn) return;

      async function submit() {
        const password = pwEl.value;
        const label = labelEl.value.trim();
        errEl.classList.remove('show');
        if (!password) {
          errEl.textContent = '管理パスワードを入力してください';
          errEl.classList.add('show');
          return;
        }
        setupBtn.disabled = true;
        setupBtn.textContent = '登録中...';
        try {
          await registerDevice(password, label);
          pwEl.value = '';
          hideDeviceSetup();
          await bootApp();
        } catch (err) {
          errEl.textContent = (err && err.message) ? err.message : '登録に失敗しました';
          errEl.classList.add('show');
        } finally {
          setupBtn.disabled = false;
          setupBtn.textContent = 'この端末を登録する';
        }
      }

      setupBtn.onclick = submit;
      pwEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') submit(); });
    })();

    // 起動: デモモードならサンプル表示、登録済みならデータ読込、未登録なら登録画面
    if (IS_DEMO) {
      seedDemoData();
      renderGrid();
    } else if (getDeviceToken()) {
      bootApp();
    } else {
      showDeviceSetup();
    }
  </script>
  </body>
</html>
